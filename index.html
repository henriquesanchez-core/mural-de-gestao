<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Gestão</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-title">
        <span class="header-icon">📋</span>
        <div>
          <h1>Painel de Gestão</h1>
          <p>Mural do Departamento</p>
        </div>
      </div>
      <nav class="tabs-nav">
        <button class="tab-btn active" data-tab="sheets">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/></svg>
          Planilhas de Gestão
        </button>
        <button class="tab-btn" data-tab="dashboards">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboards
        </button>
      </nav>
    </div>
  </header>

  <!-- ── ABA: Planilhas ── -->
  <div class="tab-content active" id="tab-sheets">
    <div class="main">

      <div class="toolbar">
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Buscar planilha..." />
        </div>
        <div class="count-badge" id="countBadge">0 planilhas</div>
        <button class="btn-primary" id="btnOpenModal">+ Nova Planilha</button>
      </div>

      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📂</div>
        <h2>Nenhuma planilha cadastrada</h2>
        <p>Clique em <strong>+ Nova Planilha</strong> para começar a organizar seu mural.</p>
      </div>

      <div class="cards-grid" id="cardsGrid"></div>
    </div>
  </div>

  <!-- ── ABA: Dashboards ── -->
  <div class="tab-content" id="tab-dashboards">
    <nav class="dash-subnav" id="dashSubnav"></nav>
    <div class="main">
      <div id="dashContent"></div>
    </div>
  </div>

  <!-- ── Modal: Planilha ── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Nova Planilha</h2>
        <button class="btn-close" id="btnCloseModal">&times;</button>
      </div>
      <form id="sheetForm" class="modal-body" novalidate>
        <input type="hidden" id="editId" />
        <div class="form-group">
          <label for="inputName">Nome da Planilha <span class="required">*</span></label>
          <input type="text" id="inputName" placeholder="Ex: Controle de Escalas — UTI" maxlength="80" />
          <span class="field-error" id="errorName"></span>
        </div>
        <div class="form-group">
          <label for="inputLink">Link <span class="required">*</span></label>
          <input type="url" id="inputLink" placeholder="https://docs.google.com/spreadsheets/..." />
          <span class="field-error" id="errorLink"></span>
        </div>
        <div class="form-group">
          <label for="inputCategory">Categoria</label>
          <input type="text" id="inputCategory" placeholder="Ex: Escalas, Financeiro, RH…" maxlength="40" list="categorySuggestions" />
          <datalist id="categorySuggestions"></datalist>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="inputOwner">Responsável</label>
            <input type="text" id="inputOwner" placeholder="Ex: João Silva" maxlength="60" />
          </div>
          <div class="form-group">
            <label for="inputCadence">Cadência</label>
            <input type="text" id="inputCadence" placeholder="Ex: Semanal, Mensal…" maxlength="40" list="cadenceSuggestions" />
            <datalist id="cadenceSuggestions">
              <option value="Diária">
              <option value="Semanal">
              <option value="Quinzenal">
              <option value="Mensal">
              <option value="Trimestral">
              <option value="Sob demanda">
            </datalist>
          </div>
        </div>
        <div class="form-group">
          <label for="inputDesc">Descrição (opcional)</label>
          <textarea id="inputDesc" placeholder="Breve descrição do conteúdo ou propósito…" rows="3" maxlength="200"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="btnCancel">Cancelar</button>
          <button type="submit" class="btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Modal: Evento ── -->
  <div class="modal-overlay" id="eventModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="eventModalTitle">Novo Evento</h2>
        <button class="btn-close" id="btnCloseEventModal">&times;</button>
      </div>
      <form id="eventForm" class="modal-body" novalidate>
        <input type="hidden" id="eventEditId" />
        <div class="form-group">
          <label for="eventTitle">Título <span class="required">*</span></label>
          <input type="text" id="eventTitle" placeholder="Ex: Reunião de equipe" maxlength="80" />
          <span class="field-error" id="errorEventTitle"></span>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="eventDate">Data <span class="required">*</span></label>
            <input type="date" id="eventDate" />
            <span class="field-error" id="errorEventDate"></span>
          </div>
          <div class="form-group">
            <label for="eventColor">Cor</label>
            <div class="color-picker" id="colorPicker">
              <button type="button" class="color-swatch active" data-color="blue" style="background:#2563eb"></button>
              <button type="button" class="color-swatch" data-color="violet" style="background:#7c3aed"></button>
              <button type="button" class="color-swatch" data-color="green" style="background:#059669"></button>
              <button type="button" class="color-swatch" data-color="amber" style="background:#d97706"></button>
              <button type="button" class="color-swatch" data-color="pink" style="background:#db2777"></button>
              <button type="button" class="color-swatch" data-color="red" style="background:#dc2626"></button>
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="eventStart">Início</label>
            <input type="time" id="eventStart" />
          </div>
          <div class="form-group">
            <label for="eventEnd">Fim</label>
            <input type="time" id="eventEnd" />
          </div>
        </div>
        <div class="form-group">
          <label for="eventDesc">Descrição (opcional)</label>
          <textarea id="eventDesc" placeholder="Detalhes do evento…" rows="3" maxlength="300"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="btnCancelEvent">Cancelar</button>
          <button type="submit" class="btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="dashboards.js"></script>
  <script src="app.js"></script>
</body>
</html>
